name: Production Quality Gate

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20.x"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cerevia?schema=public"
  JWT_SECRET: "ci-dummy-jwt-secret-for-build"
  REDIS_URL: "redis://localhost:6379"
  NEXT_PUBLIC_APP_URL: "http://localhost:3000"

jobs:
  validate:
    name: Validate (Build, Lint, Test, Typecheck)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cerevia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client & Apply Migrations
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Tests
        run: npm run test --if-present

      - name: Production Build
        run: npm run build

      - name: Check Duplicate Dependencies
        run: npx npm-dedupe --dry-run
        continue-on-error: true

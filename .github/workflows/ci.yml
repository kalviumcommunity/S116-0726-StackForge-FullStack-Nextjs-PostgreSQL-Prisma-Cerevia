name: Production Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: "20.x"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cerevia?schema=public"
  JWT_SECRET: "ci-dummy-jwt-secret-for-build"
  REDIS_URL: "redis://localhost:6379"

jobs:
  validate:
    name: Validate (Build, Lint, Test, Typecheck)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cerevia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client & Push Schema
        run: |
          npx prisma generate
          npx prisma db push --accept-data-loss

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Unit & Integration Tests
        run: npm run test --if-present

      - name: Validate Production Build
        run: npm run build
        env:
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"

      - name: Check for Duplicate Dependencies
        run: npx npm-dedupe --dry-run
        continue-on-error: true

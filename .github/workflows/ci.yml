name: Continuous Integration

on:
  push:
    branches: [ main, master, 'feat/**', 'fix/**', 'docs/**', 'refactor/**' ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: cerevia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript Type Checking
        run: npx tsc --noEmit

      - name: Run ESLint Checks
        run: npm run lint

      - name: Build Standalone Web Application
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/cerevia?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-temporary-secure-jwt-secret-string-at-least-32-characters
        run: npm run build

      - name: Apply Database Schema Migrations
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/cerevia?schema=public
        run: npx prisma db push

      - name: Run Integration Test Suite
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/cerevia?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-temporary-secure-jwt-secret-string-at-least-32-characters
          NODE_ENV: test
        run: npm run test
